# status: "untested"
# last_tested_version: "none"
# platform_notes: "None"
# breaking_changes: "None"
services:
  nextcloud-db-dumper:
    image: databack/mysql-backup:latest
    container_name: nextcloud-db-dumper
    restart: always
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    environment:
      TZ: "{{ TZ }}"
      DB_SERVER: "nextcloud-db"
      DB_USER: "{{ NEXTCLOUD_DB_USER }}"
      DB_PASS: "{{ NEXTCLOUD_DB_PASSWORD }}"
      DB_NAMES: "{{ NEXTCLOUD_DB_NAME }}"
      DB_DUMP_CRON: "0 2 * * *"
      DB_DUMP_TARGET: "/backups"
      CLEANUP_OLDER_THAN: "3"
    networks:
      - nextcloud-internal
    depends_on:
      - nextcloud-db
    volumes:
      - "{{ NEXTCLOUD_DB_DUMP_PATH }}:/backups"
