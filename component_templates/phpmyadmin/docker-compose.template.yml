# status: "testing"
# last_tested_version: "none"
# platform_notes: "Targeted for ARM architecture."
# breaking_changes: "None"
# templates/phpmyadmin/docker-compose.template.yml
services:
  phpmyadmin:
    image: arm64v8/phpmyadmin:{{ component_version }}
    container_name: piselfhosting-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mariadb # Hostname of the MariaDB service
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: ${DB_PASS} # Use the root password from .env
      # PMA_USER: ${DB_USER} # Optional: specific P_USER if not using root
      # PMA_PASSWORD: ${DB_PASS} # Optional: specific P_PASSWORD
    ports:
      - "8083:80" # phpMyAdmin web UI port
    depends_on:
      - mariadb # Ensures mariadb starts first
    volumes:
      - "{{DATA_ROOT}}/phpmyadmin/config/config.inc.php:/etc/phpmyadmin/config.inc.php" # Mount the specific config file, FHS compliant
    networks:
      - piselfhosting_net
networks:
  piselfhosting_net:
    external: true
