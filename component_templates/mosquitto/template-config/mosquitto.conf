# mosquitto.template.conf
# This is a basic configuration for Mosquitto.
# For more details, see https://mosquitto.org/documentation/
# This file is processed by envsubst if it contains environment variables.

# Listener for standard MQTT port (unencrypted)
listener 1883
protocol mqtt

# Listener for secure MQTT over WebSockets (if needed, typically Nginx handles SSL)
# listener 8080
# protocol websockets

# Allow anonymous connections. If you want to restrict access,
# uncomment 'allow_anonymous false' and configure 'password_file'.
allow_anonymous true

# Persistence: store messages to disk on shutdown/restart
# Ensure the 'data' volume is correctly mounted in docker-compose.yml.
persistence true
persistence_location /mosquitto/data/

# Log settings
# Ensure the 'log' volume is correctly mounted in docker-compose.yml.
log_dest file /mosquitto/log/mosquitto.log
log_type error
log_type warning
log_type notice
log_type information
connection_messages true
log_timestamp true

# Bridge example (if you want to bridge to another MQTT broker)
# connection bridge-01
# address otherbroker.example.com:1883
# topic # out 0
# topic # in 0
# remote_username username
# remote_password password

# Enable per-listener authentication and authorization if allow_anonymous is false
# password_file /mosquitto/config/passwd
# acl_file /mosquitto/config/acl
