# status: "untested"
# last_tested_version: "none"
# platform_notes: "None"
# breaking_changes: "None"
services:
  fluffychat-web:
    image: "{{ image_name }}:{{ component_version }}"
    container_name: piselfhosting-fluffychat-web
    ports:
      - "{{ FLUFFYCHAT_WEB_HTTP_PORT }}:80"
    volumes:
      - "./config/default.conf:/etc/nginx/conf.d/default.conf:ro"
    networks:
      - piselfhosting_net
networks:
  piselfhosting_net:
    external: true