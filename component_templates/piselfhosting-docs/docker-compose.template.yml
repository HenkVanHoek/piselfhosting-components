# status: "untested"
# last_tested_version: "none"
# platform_notes: "None"
# breaking_changes: "None"
# templates/piselfhosting-docs/docker-compose.template.yml
services:
  piselfhosting-docs:
    image: nginx:alpine
    container_name: piselfhosting-docs
    restart: unless-stopped
    volumes:
      - "{{DATA_ROOT}}/piselfhosting-docs/html:/usr/share/nginx/html:ro"
    ports:
      - "8089:80" # You can choose a specific port here that does not conflict, e.g., 8089
    networks:
      - piselfhosting_net
networks:
  piselfhosting_net:
    external: true
